<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>My Food Pyramid</title>
  <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
  
  <style>
    body {
      margin: 0; padding: 0; font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #a8e6cf, #d4f4dd);
    }
    h1 { 
      text-align: center; 
      color: #1b5e20; 
      margin: 20px 0 15px;
      font-size: 30px;
    }

    .main {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 30px;
      padding: 20px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .food-palette {
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(10px);
      padding: 25px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
      width: 380px;
    }
    .category h3 { 
      margin: 15px 0 12px; 
      color: #1b5e20; 
      text-align: center;
      font-size: 18px;
    }
    .foods { display: flex; flex-wrap: wrap; gap: 18px; justify-content: center; }

    .food-item {
      font-size: 50px; 
      cursor: pointer; 
      padding: 10px; 
      border-radius: 16px;
      transition: all 0.25s ease;
      background: white;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    .food-item:hover { transform: scale(1.15); }
    .food-item.selected { 
      background: #a8e6cf; 
      transform: scale(1.25); 
      box-shadow: 0 0 0 4px #1b5e20;
    }

    .pyramid-area {
      position: relative;
      width: 520px;
      height: 580px;
      filter: drop-shadow(0 15px 25px rgba(0,0,0,0.25));
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
      margin-top: 20px;
    }
    button {
      padding: 14px 24px;
      font-size: 16px;
      background: linear-gradient(#2e7d32, #1b5e20);
      color: white;
      border: none;
      border-radius: 50px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }
    button:hover {
      transform: translateY(-2px);
    }
  </style>
</head>
<body>
  <h1>🍽️ My Food Pyramid</h1>
  
  <div class="main">
    <div class="food-palette">
      <div class="category"><h3>🥖 Carbohydrates</h3><div class="foods" id="carb"></div></div>
      <div class="category"><h3>🍗 Proteins</h3><div class="foods" id="protein"></div></div>
      <div class="category"><h3>🥦 Vegetables & Fruits</h3><div class="foods" id="veg"></div></div>
    </div>

    <div>
      <div class="pyramid-area" id="pyramidWrapper">
        <svg width="520" height="580" style="position:absolute;">
          <!-- Triangle -->
          <polygon points="60,80 460,80 260,540" fill="#ffeb3b" stroke="#1b5e20" stroke-width="18"/>
          
          <!-- Dividing lines -->
          <line x1="135" y1="242" x2="385" y2="242" stroke="#1b5e20" stroke-width="6"/>
          <line x1="195" y1="392" x2="325" y2="392" stroke="#1b5e20" stroke-width="6"/>
          
          <!-- Labels inside SVG (permanent) -->
          <text x="260" y="125" text-anchor="middle" fill="#1b5e20" font-size="17" font-weight="bold">Eat Most</text>
          <text x="260" y="275" text-anchor="middle" fill="#1b5e20" font-size="17" font-weight="bold">Eat Moderately</text>
          <text x="260" y="425" text-anchor="middle" fill="#1b5e20" font-size="17" font-weight="bold">Eat Least</text>
        </svg>
        
        <div id="pyramidContainer" style="position:absolute; width:520px; height:580px; top:0; left:0;"></div>
      </div>

      <div class="controls">
        <button onclick="undo()">↩️ Undo</button>
        <button onclick="redo()">↪️ Redo</button>
      </BR>
        <button onclick="resetPyramid()">Reset All</button>
        <button onclick="saveAsImage()">💾 Save Image</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
