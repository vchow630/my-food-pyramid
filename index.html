<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>My Food Pyramid</title>
  <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
  
  <style>
    body {
      margin: 0; padding: 0; font-family: Arial, sans-serif;
      background: linear-gradient(#e8f5e9, #c8e6c8);
    }
    h1 { text-align: center; color: #1b5e20; margin: 20px 0 15px; }

    .main {
      display: flex;
      justify-content: center;
      gap: 30px;
      flex-wrap: wrap;
      padding: 20px;
    }

    .food-palette {
      background: white; padding: 18px; border-radius: 16px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.15); width: 380px;
    }
    .category h3 { margin: 12px 0 10px; color: #2e7d32; text-align: center; }
    .foods { display: flex; flex-wrap: wrap; gap: 14px; justify-content: center; }

    .food-item {
      font-size: 46px; cursor: grab; padding: 6px; border-radius: 12px;
    }
    .food-item:active { transform: scale(1.3); }

    .pyramid-wrapper {
      position: relative;
      width: 570px;
      height: 650px;
    }

    .controls {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 60px;
    }
    button {
      padding: 14px 24px;
      font-size: 16px;
      background: #2e7d32;
      color: white;
      border: none;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <h1>🍽️ My Food Pyramid</h1>
  
  <div class="main">
    <div class="food-palette">
      <div class="category"><h3>🥖 Carbohydrates</h3><div class="foods" id="carb"></div></div>
      <div class="category"><h3>🍗 Proteins</h3><div class="foods" id="protein"></div></div>
      <div class="category"><h3>🥦 Vegetables & Fruits</h3><div class="foods" id="veg"></div></div>
    </div>

    <div class="pyramid-wrapper" id="pyramidWrapper">
     <!-- <svg width="570" height="650" id="pyramidSVG" style="position:absolute;">  -->
	  <svg width="600" height="680" id="pyramidSVG" style="position:absolute;">
        <!-- Inverted Triangle -->
        <polygon points="80,90 490,90 285,590" fill="#ffeb3b" stroke="#1b5e20" stroke-width="14"/>
        
        <!-- Fixed Dividing Lines (shorter) 
        <line x1="135" y1="260" x2="435" y2="260" stroke="#1b5e20" stroke-width="6"/>
        <line x1="190" y1="425" x2="380" y2="425" stroke="#1b5e20" stroke-width="6"/> -->
		
		<!-- Fixed Dividing Lines (shorter) -->
        <line x1="145" y1="260" x2="420" y2="260" stroke="#1b5e20" stroke-width="6"/>
        <line x1="211" y1="425" x2="359" y2="425" stroke="#1b5e20" stroke-width="6"/>
		
      </svg>
      
      <div id="pyramidContainer" style="position:absolute; width:570px; height:650px; top:0; left:0;">
        <div class="label" style="top: 105px; left:50%; transform:translateX(-50%); position:absolute; font-weight:bold; color:#1b5e20; font-size:17px; z-index:100; text-shadow:0 2px 6px white;">Eat Most</div>
<!--        <div class="label" style="top: 305px; left:50%; transform:translateX(-50%); position:absolute; font-weight:bold; color:#1b5e20; font-size:17px; z-index:100; text-shadow:0 2px 6px white;">Eat Moderately</div> -->
        <div class="label" style="top: 270px; left:50%; transform:translateX(-50%); position:absolute; font-weight:bold; color:#1b5e20; font-size:17px; z-index:100; text-shadow:0 2px 6px white;">Eat Moderately</div>
<!--         <div class="label" style="top: 490px; left:50%; transform:translateX(-50%); position:absolute; font-weight:bold; color:#1b5e20; font-size:17px; z-index:100; text-shadow:0 2px 6px white;">Eat Least</div> -->
        <div class="label" style="top: 430px; left:50%; transform:translateX(-50%); position:absolute; font-weight:bold; color:#1b5e20; font-size:17px; z-index:100; text-shadow:0 2px 6px white;">Eat Least</div>
      </div>
    </div>

    <div class="controls">
      <button onclick="undo()">↩️ Undo</button>
      <button onclick="redo()">↪️ Redo</button>
      <button onclick="resetPyramid()">Reset All</button>
      <button onclick="saveAsImage()">💾 Save Image</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
